services:
  api:
    image: python:3.12-slim
    container_name: 4mation-api
    working_dir: /app
    ports:
      - "127.0.0.1:8097:8097"
    environment:
      PYTHONPATH: /app:/app/script
      SESSION_DB_PATH: /app/data/sessions.db
      TABLEBASE_DB_PATH: /app/data/tablebase.db
    volumes:
      - 4mation-sessions:/app/data
    command:
      - sh
      - -c
      - |
        apt-get update && apt-get install -y --no-install-recommends git curl
        rm -rf /tmp/repo
        git clone --depth 1 https://github.com/lustucrus4/4mation.git /tmp/repo
        cp -a /tmp/repo/api /tmp/repo/script /app/
        pip install --no-cache-dir -r /app/api/requirements.txt
        mkdir -p /app/logs /app/data
        if [ ! -f /app/data/tablebase.db ] && [ -f /app/script/solver/data/tablebase.db ]; then
          cp /app/script/solver/data/tablebase.db /app/data/tablebase.db
        fi
        exec gunicorn -c /app/api/gunicorn_config.py --bind 0.0.0.0:8097 api.app:app
    restart: always

  nginx-http:
    image: alpine:3.20
    container_name: 4mation-nginx-http
    network_mode: host
    pid: host
    privileged: true
    volumes:
      - /etc/nginx:/etc/nginx
      - /var/www/4mation:/var/www/4mation
      - /var/www/certbot:/var/www/certbot
      - /var/run:/var/run
    restart: "no"
    depends_on:
      - api
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache git curl unzip rsync
        mkdir -p /var/www/4mation /var/www/certbot
        rm -rf /tmp/repo
        git clone --depth 1 https://github.com/lustucrus4/4mation.git /tmp/repo
        rsync -a --delete /tmp/repo/4mation_dashboard_deploy/ /var/www/4mation/
        echo nginx-http-ok

  certbot:
    image: certbot/certbot:latest
    container_name: 4mation-certbot
    network_mode: host
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    restart: "no"
    depends_on:
      nginx-http:
        condition: service_completed_successfully
    entrypoint: /bin/sh
    command:
      - -ec
      - |
        certbot certonly --webroot -w /var/www/certbot \
          -d 4mation.lab211.fr -d api-4mation.lab211.fr \
          --email admin@lab211.fr --agree-tos --non-interactive \
          --keep-until-expiring || certbot certonly --webroot -w /var/www/certbot \
          -d 4mation.lab211.fr -d api-4mation.lab211.fr \
          --email admin@lab211.fr --agree-tos --non-interactive --force-renewal
        echo certbot-done

  nginx-ssl:
    image: alpine:3.20
    container_name: 4mation-nginx-ssl
    network_mode: host
    pid: host
    privileged: true
    volumes:
      - /etc/nginx:/etc/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/4mation:/var/www/4mation:ro
      - /var/run:/var/run
    restart: "no"
    depends_on:
      certbot:
        condition: service_completed_successfully
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache git curl unzip rsync
        CERT=/etc/letsencrypt/live/4mation.lab211.fr
        if [ ! -f "$$CERT/fullchain.pem" ]; then CERT=/etc/letsencrypt/live/api-4mation.lab211.fr; fi
        test -f "$$CERT/fullchain.pem"
        rm -rf /tmp/repo
        git clone --depth 1 https://github.com/lustucrus4/4mation.git /tmp/repo
        sed "s|CERT_PLACEHOLDER|$$CERT|g" /tmp/repo/deploy/nginx-4mation.conf.template > /etc/nginx/sites-available/4mation
        ln -sf /etc/nginx/sites-available/4mation /etc/nginx/sites-enabled/4mation
        if command -v nginx >/dev/null 2>&1; then nginx -t; fi
        if [ -f /var/run/nginx.pid ]; then kill -HUP $$(cat /var/run/nginx.pid); elif command -v nginx >/dev/null 2>&1; then nginx; fi
        echo nginx-ssl-ok

volumes:
  4mation-sessions:
