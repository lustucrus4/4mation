<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4mation — Avancement solveur</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="app app-wide">
      <header class="header">
        <div class="header-top">
          <h1>Avancement solveur</h1>
          <a href="/" class="btn btn-ghost">← Retour au jeu</a>
        </div>
        <p class="subtitle">Phase C — construction de la tablebase complète (7×7)</p>
      </header>

      <section class="solver-panel">
        <div class="progress-header">
          <span id="status-badge" class="status-badge status-paused">—</span>
          <span id="progress-pct" class="progress-pct">0 %</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
        </div>

        <dl class="stats-grid">
          <div class="stat">
            <dt>Positions résolues</dt>
            <dd id="stat-solved">—</dd>
          </div>
          <div class="stat">
            <dt>Objectif estimé</dt>
            <dd id="stat-target">—</dd>
          </div>
          <div class="stat">
            <dt>Vitesse</dt>
            <dd id="stat-rate">—</dd>
          </div>
          <div class="stat">
            <dt>Temps restant</dt>
            <dd id="stat-eta">—</dd>
          </div>
          <div class="stat">
            <dt>Durée écoulée</dt>
            <dd id="stat-duration">—</dd>
          </div>
          <div class="stat">
            <dt>Phase</dt>
            <dd id="stat-phase">—</dd>
          </div>
        </dl>
        <p class="stat-updated">Dernière mise à jour : <span id="stat-updated">—</span></p>
      </section>

      <section class="recent-section">
        <h2>Derniers coups calculés</h2>
        <div id="recent-grid" class="recent-grid"></div>
      </section>

      <p id="message" class="message"></p>

      <footer class="site-footer">
        <a href="/">4mation — jouer</a>
      </footer>
    </div>
    <script type="module" src="/src/solver.js"></script>
  </body>
</html>
