# Configuration Nginx — frontend statique 4mation.lab211.fr
# Fichier suggéré : /etc/nginx/sites-available/4mation-frontend

server {
    listen 80;
    server_name 4mation.lab211.fr;

    root /var/www/4mation;
    index index.html;

    access_log /var/log/nginx/4mation_frontend_access.log;
    error_log /var/log/nginx/4mation_frontend_error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# Configuration Nginx — API api-4mation.lab211.fr
# Fichier suggéré : /etc/nginx/sites-available/4mation-api

server {
    listen 80;
    server_name api-4mation.lab211.fr;

    client_max_body_size 10M;

    access_log /var/log/nginx/4mation_api_access.log;
    error_log /var/log/nginx/4mation_api_error.log;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

